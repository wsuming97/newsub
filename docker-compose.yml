services:
  youhu:
    build: .
    container_name: youhu
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      # 数据库持久化：挂载到宿主机，重启/升级不丢数据
      - ./data:/app/data
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/youhu.db
      # 管理员 token：保护 POST/DELETE 写接口，生产环境必须配置
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # CORS 白名单：限制允许的前端域名，多个用逗号分隔，生产环境必须配置
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
