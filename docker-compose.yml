services:
  youhu:
    build: .
    container_name: youhu
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # CORS 白名单：限制允许访问后端 API 的前端域名，多个用逗号分隔
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # 持久化缓存目录：缓存数据库与未来迁移产物都统一写在这里
      CACHE_DIR: /app/data
      CACHE_DB_PATH: /app/data/cache.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
